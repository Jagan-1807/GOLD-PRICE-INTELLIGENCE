<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Aura: Prediction Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- AOS CSS for Scroll Effects -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: rgba(31, 40, 51, 0.7);
      --accent-color: #66fcf1;
      --accent-hover: #45a29e;
      --text-main: #c5c6c7;
      --text-highlight: #ffffff;
      --border-color: rgba(102, 252, 241, 0.3);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      background: radial-gradient(circle at center, #111418 0%, #050608 100%);
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      background: rgba(102, 252, 241, 0.15);
      filter: blur(80px);
      animation: pulse 4s infinite alternate ease-in-out;
    }
    .orb1 { width: 450px; height: 450px; top: 15%; left: 35%; }
    
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.15); opacity: 1; }
    }

    nav {
      padding: 20px 50px;
      display: flex;
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(11, 12, 16, 0.7);
    }
    .logo {
      font-size: 26px; font-weight: 700; color: var(--accent-color);
      text-decoration: none; text-transform: uppercase; letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 0 20px;
      width: 100%;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 60px 50px;
      text-align: center;
      /* removed fadeUp animation so AOS handles it */
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: box-shadow 0.4s ease, transform 0.4s ease;
    }
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 25px rgba(102, 252, 241, 0.1);
    }

    .subtitle { 
      color: var(--accent-hover); 
      font-size: 1.2rem; 
      margin-bottom: 15px; 
      text-transform: uppercase; 
      letter-spacing: 3px; 
      font-weight: 600;
    }
    
    .price-display {
      font-size: 5.5rem;
      font-weight: 700;
      color: var(--text-highlight);
      margin: 10px 0;
      text-shadow: 0 0 25px rgba(102, 252, 241, 0.6);
      display: inline-block;
      animation: zoomIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
    .price-display span { 
      font-size: 3rem; 
      color: var(--accent-color); 
      vertical-align: super; 
      margin-right: 5px; 
      opacity: 0.8;
    }

    .info-text {
      color: rgba(255,255,255,0.6); 
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .inputs-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px 0 50px 0;
      flex-wrap: wrap;
      /* removed fadeUp animation */
    }
    .input-pill {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.95rem;
      color: white;
      transition: all 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .input-pill:hover {
      border-color: rgba(102, 252, 241, 0.4);
      transform: translateY(-2px);
    }
    .input-pill strong { color: var(--accent-color); margin-right: 8px; font-weight: 600; }

    .btn-glow {
      display: inline-block;
      text-decoration: none;
      background: var(--accent-color);
      color: #000;
      padding: 16px 45px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
      /* removed fadeUp animation */
    }
    .btn-glow:hover {
      box-shadow: 0 0 35px rgba(102, 252, 241, 0.8);
      transform: translateY(-3px);
      background: #8cfdf5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 600px) {
      .price-display { font-size: 4rem; }
      .glass-card { padding: 40px 25px; }
      .price-display span { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="bg-animation"><div class="orb orb1"></div></div>

  <nav><a href="/" class="logo">Aura</a></nav>

  <div class="container">
    <div class="glass-card" data-aos="zoom-in" data-aos-duration="1000">
      <div class="subtitle">Estimated Gold Price (GLD)</div>
      
      <div class="price-display">
        <span>$</span>{{ prediction }}
      </div>
      <p style="color: var(--accent-color); font-size: 1.2rem; margin-bottom: 20px; font-weight: 600;">
        Predicted change: {{ predicted_return_pct }}%
      </p>

      <p class="info-text">Market forecast generated based on the latest indicators</p>

      <div class="inputs-grid">
        <div class="input-pill"><strong>SPX</strong> {{ input_data['SPX'] }}</div>
        <div class="input-pill"><strong>USO</strong> {{ input_data['USO'] }}</div>
        <div class="input-pill"><strong>SLV</strong> {{ input_data['SLV'] }}</div>
        <div class="input-pill"><strong>EUR/USD</strong> {{ input_data['EUR/USD'] }}</div>
      </div>

      <a href="/" class="btn-glow">New Forecast &rarr;</a>
    </div>
  </div>

  <!-- AOS Library for Scroll Animations -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script>
    AOS.init({ once: false, mirror: true });

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const orb1 = document.querySelector('.orb1');
      if(orb1) orb1.style.transform = `translateY(${scrollY * 0.3}px) scale(${1 + scrollY * 0.001})`;
    });
  </script>
</body>
</html>
